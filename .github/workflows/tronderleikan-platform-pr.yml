# PR-sjekk for tronderleikan-platform: test platform + pkg, verifiser at Dockerfile bygger.
# SIKKERHET (alle nye apper MÅ følge dette, se CLAUDE.md):
#   - on: pull_request (ALDRI pull_request_target)
#   - permissions: contents: read (ingen skrivetilgang)
#   - INGEN secrets: inherit, ingen GHCR/gitops-credentials (docker-build push=false)
# Tester er spraak-spesifikke og bor her i caller, ikke i docker-build-action.
name: tronderleikan-platform PR

on:
  pull_request:
    paths:
      - "apps/tronderleikan/platform/**"
      - "apps/tronderleikan/pkg/**"
      - ".github/workflows/tronderleikan-platform-pr.yml"
      - ".github/actions/docker-build/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: apps/tronderleikan/platform/go.mod
          # begge modulene i suiten cacher på sine egne go.sum
          cache-dependency-path: |
            apps/tronderleikan/platform/go.sum
            apps/tronderleikan/pkg/go.sum

      - name: Test platform
        working-directory: apps/tronderleikan/platform
        run: |
          go vet ./...
          go test ./...

      - name: Test pkg
        working-directory: apps/tronderleikan/pkg
        run: |
          go vet ./...
          go test ./...

      - name: Build image (no push)
        uses: ./.github/actions/docker-build
        with:
          app_dir: apps/tronderleikan
          dockerfile: apps/tronderleikan/platform/Dockerfile
          image: ghcr.io/kongebra/tronderleikan-platform
          tag: pr-${{ github.sha }}
          push: false
