# PR-sjekk for go-hello-world: kjør app-tester + verifiser at Dockerfile bygger.
# SIKKERHET (alle nye apper MÅ følge dette, se CLAUDE.md):
#   - on: pull_request (ALDRI pull_request_target)
#   - permissions: contents: read (ingen skrivetilgang)
#   - INGEN secrets: inherit, ingen GHCR/gitops-credentials (docker-build push=false)
# Tester er språk-spesifikke og bor her i caller, ikke i docker-build-action.
name: go-hello-world PR

on:
  pull_request:
    paths:
      - "apps/go-hello-world/**"
      - ".github/workflows/go-hello-world-pr.yml"
      - ".github/actions/docker-build/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: apps/go-hello-world/go.mod
          cache-dependency-path: apps/go-hello-world/go.sum  # modul ligger i app-mappa, ikke repo-rot

      - name: Test
        working-directory: apps/go-hello-world
        run: |
          go vet ./...
          go test ./...

      - name: Build image (no push)
        uses: ./.github/actions/docker-build
        with:
          app_dir: apps/go-hello-world
          image: ghcr.io/kongebra/go-hello-world
          tag: pr-${{ github.sha }}
          push: false
