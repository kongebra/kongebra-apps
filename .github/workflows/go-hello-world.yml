name: go-hello-world

on:
  push:
    branches: [main]
    paths:
      - "apps/go-hello-world/**"
      - ".github/workflows/go-hello-world.yml"
      - ".github/workflows/_build-deploy.yml"
      - ".github/actions/gitops-promote/**"
      - ".github/actions/docker-build/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Eksisterende tag aa deploye, f.eks. 2026-06-25-9571da7 (rollback/promote). Tom = bygg current."
        required: false

# Caller må gi minst det reusable-workflowen krever (repo-default er read-only).
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_build-deploy.yml
    with:
      app: go-hello-world
      app_dir: apps/go-hello-world
      image: ghcr.io/kongebra/go-hello-world
      image_tag: ${{ github.event.inputs.image_tag || '' }}
    secrets: inherit
