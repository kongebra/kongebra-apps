# TronderLeikan roster: build-once-promote via _build-deploy.yml (SPEC §11).
# Path-filter inkluderer pkg/** - endring i delt lib bygger tjenesten på nytt.
name: tronderleikan-roster

on:
  push:
    branches: [main]
    paths:
      - "apps/tronderleikan/roster/**"
      - "apps/tronderleikan/pkg/**"
      - ".github/workflows/tronderleikan-roster.yml"
      - ".github/workflows/_build-deploy.yml"
      - ".github/actions/gitops-promote/**"
      - ".github/actions/docker-build/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Eksisterende tag å deploye, f.eks. 2026-07-04-9571da7 (rollback/promote). Tom = bygg current."
        required: false

# Caller må gi minst det reusable-workflowen krever (repo-default er read-only).
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_build-deploy.yml
    with:
      app: tronderleikan
      # Context er apps/tronderleikan (roster bruker pkg via replace ../pkg),
      # derfor eksplisitt dockerfile-input.
      app_dir: apps/tronderleikan
      dockerfile: apps/tronderleikan/roster/Dockerfile
      image: ghcr.io/kongebra/tronderleikan-roster
      image_tag: ${{ github.event.inputs.image_tag || '' }}
    secrets: inherit
