# Gjenbrukbar build-once-promote mot k3s via GitOps. Kalles av per-app workflows.
# Bygger ETT immutabelt image per main-commit, deployer auto til dev, promoterer
# samme tag til prod bak en GitHub Environment-gate. Ingen rebuild for prod.
# Deploy = skrive taggen inn i kongebra-gitops-overlayet; ArgoCD ruller den ut.
# Se ADR-0001 (docs/adr/0001-build-once-promote.md).
name: build-deploy (reusable)

on:
  workflow_call:
    inputs:
      app:
        description: "App-navn, f.eks. go-hello-world"
        required: true
        type: string
      app_dir:
        description: "Build-context, f.eks. apps/go-hello-world"
        required: true
        type: string
      image:
        description: "Image uten tag, f.eks. ghcr.io/kongebra/go-hello-world"
        required: true
        type: string
      image_tag:
        description: "Eksisterende tag (rollback/promote). Satt = hopp over build, promoter eksisterende."
        required: false
        type: string
        default: ""

# build trenger packages:write for GHCR-push. deploy-jobbene pusher til gitops-repoet
# via GITOPS_DEPLOY_KEY (ssh), ikke GITHUB_TOKEN, saa de bryr seg ikke om disse.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve image tag
        id: tag
        # rollback/promote (input satt) hopper over build; ellers lesbar dato+short-sha (UTC)
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.tag.outputs.build == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to GHCR
        if: steps.tag.outputs.build == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.tag.outputs.build == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ${{ inputs.app_dir }}
          push: true
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
          # Immutabel dato+sha-tag + full-sha for digest-stabil referanse. Ingen :latest
          # (overlayet pinner taggen, og :latest ville bryte build-once-promote-sporbarheten).
          tags: |
            ${{ inputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ inputs.image }}:${{ github.sha }}

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    # Serialiser gitops-skriving per app+env saa samtidige app-pushes ikke klobber hverandre.
    concurrency:
      group: gitops-${{ inputs.app }}-dev
      cancel-in-progress: false
    steps:
      - name: Checkout caller repo (for composite action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Promote to dev
        uses: ./.github/actions/gitops-promote
        with:
          app: ${{ inputs.app }}
          image: ${{ inputs.image }}
          tag: ${{ needs.build.outputs.tag }}
          env: dev
          deploy_key: ${{ secrets.GITOPS_DEPLOY_KEY }}

  deploy-prod:
    # deploy-dev for rekkefoelge (dev foer prod), build for tag-outputen
    needs: [deploy-dev, build]
    runs-on: ubuntu-latest
    # environment: production er selve gaten - required reviewer maa godkjenne foer dette kjoerer.
    environment: production
    concurrency:
      group: gitops-${{ inputs.app }}-prod
      cancel-in-progress: false
    steps:
      - name: Checkout caller repo (for composite action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Promote to prod
        uses: ./.github/actions/gitops-promote
        with:
          app: ${{ inputs.app }}
          image: ${{ inputs.image }}
          tag: ${{ needs.build.outputs.tag }}
          env: prod
          deploy_key: ${{ secrets.GITOPS_DEPLOY_KEY }}
