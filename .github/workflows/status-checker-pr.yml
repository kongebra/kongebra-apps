# PR-sjekk for status-checker: kjør app-tester + verifiser at Dockerfile bygger.
# SIKKERHET (alle nye apper MÅ følge dette, se CLAUDE.md):
#   - on: pull_request (ALDRI pull_request_target)
#   - permissions: contents: read (ingen skrivetilgang)
#   - INGEN secrets: inherit, ingen GHCR/gitops-credentials (docker-build push=false)
# Tester er språk-spesifikke og bor her i caller, ikke i docker-build-action.
name: status-checker PR

on:
  pull_request:
    paths:
      - "apps/status-checker/**"
      - ".github/workflows/status-checker-pr.yml"
      - ".github/actions/docker-build/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: apps/status-checker/go.mod
          cache-dependency-path: apps/status-checker/go.sum
      - name: Test
        working-directory: apps/status-checker
        run: |
          go vet ./...
          go test -race ./...
      - name: Build image (no push)
        uses: ./.github/actions/docker-build
        with:
          app_dir: apps/status-checker
          image: ghcr.io/kongebra/status-checker
          tag: pr-${{ github.sha }}
          push: false
