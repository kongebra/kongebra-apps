name: saga-api

on:
  push:
    branches: [main]
    paths:
      - "apps/saga-api/**"
      - ".github/workflows/saga-api.yml"
      - ".github/workflows/_build-deploy.yml"
      - ".github/actions/gitops-promote/**"
      - ".github/actions/docker-build/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing tag to deploy (rollback/promote). Empty = build current."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_build-deploy.yml
    with:
      app: saga-api
      app_dir: apps/saga-api
      image: ghcr.io/kongebra/saga-api
      image_tag: ${{ github.event.inputs.image_tag || '' }}
    secrets: inherit
