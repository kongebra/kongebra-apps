name: saga-api

# Saga is prod-only (no dev/prod split): build one immutable image per main commit
# and promote it straight to prod behind the production Environment gate.
on:
  push:
    branches: [main]
    paths:
      - "apps/saga-api/**"
      - ".github/workflows/saga-api.yml"
      - ".github/actions/gitops-promote/**"
      - ".github/actions/docker-build/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing tag to deploy (rollback/promote). Empty = build current."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve image tag
        id: tag
        # rollback/promote (input set) skips build; else a readable date+short-sha (UTC)
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.tag.outputs.build == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Build and push image
        if: steps.tag.outputs.build == 'true'
        uses: ./.github/actions/docker-build
        with:
          app_dir: apps/saga-api
          image: ghcr.io/kongebra/saga-api
          tag: ${{ steps.tag.outputs.tag }}
          push: true

  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    # environment: production is the gate - a required reviewer approves before this runs.
    environment: production
    concurrency:
      group: gitops-saga-api-prod
      cancel-in-progress: false
    steps:
      - name: Checkout caller repo (for composite action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Promote to prod
        uses: ./.github/actions/gitops-promote
        with:
          app: saga-api
          image: ghcr.io/kongebra/saga-api
          tag: ${{ needs.build.outputs.tag }}
          env: prod
          deploy_key: ${{ secrets.GITOPS_DEPLOY_KEY }}
