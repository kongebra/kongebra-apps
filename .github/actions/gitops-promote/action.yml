# Skriver en immutabel image-tag inn i kongebra-gitops sitt overlay for <env> og
# pusher. ArgoCD ruller endringen ut. Brukt av begge deploy-jobbene i _build-deploy.yml.
# Build-once-promote: prod faar noeyaktig samme tag som dev (ingen rebuild).
name: gitops-promote
description: Promote an image tag into a kongebra-gitops env overlay and push

inputs:
  app:
    description: "App-navn (= mappe under apps/ i gitops)"
    required: true
  image:
    description: "Image uten tag, f.eks. ghcr.io/kongebra/go-hello-world"
    required: true
  tag:
    description: "Immutabel tag aa promotere"
    required: true
  env:
    description: "Miljoe: dev eller prod (= overlays/<env>)"
    required: true
  deploy_key:
    description: "SSH write deploy-key til kongebra-gitops"
    required: true

runs:
  using: composite
  steps:
    - name: Checkout gitops repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        repository: kongebra/kongebra-gitops
        ref: main
        ssh-key: ${{ inputs.deploy_key }}
        path: gitops

    - name: Install kustomize
      shell: bash
      # ponytail: pinnet v5.4.3; bump når et overlay trenger nyere kustomize-felter
      run: |
        curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
          | sudo tar xz -C /usr/local/bin kustomize
        kustomize version

    - name: Set tag in overlay and push
      shell: bash
      # Inputs via env (ikke direkte ${{ }} i run) for aa unngaa shell-injection.
      env:
        APP: ${{ inputs.app }}
        IMAGE: ${{ inputs.image }}
        TAG: ${{ inputs.tag }}
        ENVIRONMENT: ${{ inputs.env }}
      run: |
        set -euo pipefail
        # Build-once-promote: pin på DIGEST (immutabel), ikke mutbar tag. Resolver digesten
        # fra taggen i GHCR (public image, ingen auth) - uniformt for både build og rollback,
        # og garanterer at prod får nøyaktig samme bytes som dev (kryptografisk, ikke tag-tillit).
        DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')
        echo "Resolved ${IMAGE}:${TAG} -> ${DIGEST}"

        git config user.name "kongebra-ci[bot]"
        git config user.email "ci@users.noreply.github.com"

        # Fler tjenester deler ÉN overlay-fil (apps/tronderleikan/overlays/<env>, hver
        # tjeneste sin images:-entry). Ved samtidige promotes (delt-infra-endring treffer
        # alle 5) unngår vi merge-konflikter ved å RE-DERIVERE i stedet for å rebase en
        # ferdig commit: hver runde nullstiller til fersk origin/main og kjører kustomize
        # edit på nytt, så vi aldri merger to redigeringer av samme images:-blokk. Kun
        # push-race (lock ref) gjenstår -> ny runde. (Rebase av en pre-laget commit gav
        # CONFLICT + låst arbeidstre som brant alle retries, 2026-07-07.)
        cd gitops
        OVERLAY="apps/${APP}/overlays/${ENVIRONMENT}"
        for attempt in 1 2 3 4 5 6 7 8; do
          git fetch --quiet origin main
          git reset --hard --quiet origin/main
          ( cd "$OVERLAY" && kustomize edit set image "${IMAGE}=${IMAGE}@${DIGEST}" )
          git add "$OVERLAY/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Tag uendret (${TAG}) for ${APP}/${ENVIRONMENT}, ingen commit."
            exit 0
          fi
          git commit -q -m "promote ${APP} -> ${ENVIRONMENT} (${TAG} ${DIGEST})"
          if git push --quiet origin main; then
            echo "Pushet (forsoek ${attempt})."
            exit 0
          fi
          echo "push-forsoek ${attempt} feilet (samtidig push), re-deriverer..."
          sleep $((attempt * 2))
        done
        echo "Klarte ikke pushe til gitops etter flere forsoek." >&2
        exit 1
