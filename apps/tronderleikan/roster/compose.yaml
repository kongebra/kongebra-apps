# Per-tjeneste fallback for roster (SPEC §12): kun tjenestens egne avhengigheter,
# for en agent som jobber på roster alene uten hele Aspire-flåten.
# Hele produktet lokalt: bruk apps/tronderleikan/apphost (aspire run). Se docs/LOCAL-DEV.md.
# ponytail: postgres + nats holder for roster; Zitadel/otel kjøres via Aspire ved behov.
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: roster
      POSTGRES_PASSWORD: roster
      POSTGRES_DB: roster
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roster"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11
    command: ["-js"] # JetStream
    ports:
      - "4222:4222"
