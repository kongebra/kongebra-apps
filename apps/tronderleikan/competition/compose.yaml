# Per-tjeneste fallback for competition (SPEC §12): kun tjenestens egne
# avhengigheter, for en agent som jobber på competition alene uten hele
# Aspire-flåten. Hele produktet lokalt: bruk apps/tronderleikan/apphost
# (aspire run). Se docs/LOCAL-DEV.md.
# ponytail: postgres + nats holder for competition; roster/Zitadel/otel kjøres
# via Aspire ved behov (ref-validering kan fakes med en enkel HTTP-stub lokalt).
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: competition
      POSTGRES_PASSWORD: competition
      POSTGRES_DB: competition
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competition"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11
    command: ["-js"] # JetStream
    ports:
      - "4222:4222"
